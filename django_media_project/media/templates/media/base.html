<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Media{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 15px;
        }
        
        h2 {
            color: #667eea;
            margin-top: 30px;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        
        .media-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        
        .media-title {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 10px;
        }
        
        .media-description {
            color: #666;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        
        .media-url {
            color: #667eea;
            word-break: break-all;
        }
        
        .comment {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
        }
        
        .comment-author {
            font-weight: bold;
            color: #764ba2;
            margin-bottom: 8px;
        }
        
        .comment-text {
            color: #555;
            line-height: 1.6;
            margin-bottom: 8px;
        }
        
        .comment-date {
            font-size: 0.9em;
            color: #999;
        }
        
        .no-comment {
            background: #fff3cd;
            padding: 15px;
            border-radius: 5px;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        
        .nav-links {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
        }
        
        .nav-links a {
            display: inline-block;
            padding: 10px 20px;
            margin-right: 10px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        
        .nav-links a:hover {
            background: #764ba2;
        }
        
        .media-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        
        .media-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .media-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
            border-color: #667eea;
        }
        
        .media-card h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .media-card p {
            color: #666;
            font-size: 0.9em;
            line-height: 1.5;
        }
        
        .media-card a {
            display: inline-block;
            margin-top: 10px;
            color: #764ba2;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
